<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>筑梦激斗</title>
  <link rel="stylesheet" href="css/style.css?v=10">
  <script>(function(){try{localStorage.setItem('_t','1');localStorage.removeItem('_t');}catch(e){const m={};window.localStorage={getItem(k){return m[k]??null;},setItem(k,v){m[k]=String(v);},removeItem(k){delete m[k];},clear(){for(const k in m)delete m[k];},get length(){return Object.keys(m).length;},key(i){return Object.keys(m)[i]??null;}};}})();</script>
</head>
<body>
<div id="gameCanvas"></div>
<!-- 主菜单 -->
<div id="mainMenu">
  <h1 class="menu-title">筑梦激斗</h1>
  <div class="menu-subtitle">3D 起床战争</div>
  <button class="menu-btn" id="profileBtn">玩家资料</button>
  <button class="menu-btn" id="playBtn">选择模式 / 房间</button>
  <button class="menu-btn" id="workshopBtn">创作工坊</button>
  <div id="authStatus">请先登录</div>
  <div id="roomStatus"></div>
</div>
<!-- 玩家资料 -->
<div id="profilePanel" class="overlay-panel" style="display:none">
  <button class="panel-close-btn">&times;</button>
  <h2>玩家资料</h2>
  <div id="profileInfo"><span id="profileNick">游客</span> / <span id="profileRank">未定级</span> / <span id="profilePass">通行证 Lv.0</span></div>
  <div id="loginForm">
    <input type="text" id="loginUser" placeholder="用户名">
    <input type="password" id="loginPass" placeholder="密码">
    <button id="loginBtn">登录</button><button id="registerBtn">注册</button>
  </div>
  <div id="profileLoginStatus"></div>
</div>
<!-- 模式选择 -->
<div id="playOptionsPanel" class="overlay-panel" style="display:none">
  <button class="panel-close-btn">&times;</button>
  <h2>选择开战方式</h2>
  <button id="createRoomBtn">创建房间</button>
  <div style="margin:8px 0"><input id="roomCodeInput" placeholder="输入房间码"><button id="joinRoomBtn">加入房间</button></div>
  <button id="localPlayBtn">本地试玩（需登录）</button>
  <button id="reconnectBtn">断线重连</button>
</div>
<!-- 房间面板 -->
<div id="roomPanel" class="overlay-panel" style="display:none;position:fixed;left:0;top:0;bottom:0;width:320px;overflow-y:auto;z-index:100">
  <div class="room-panel-header">
    <h2 id="roomPanelTitle">我的房间</h2><span id="roomPanelCode"></span><button class="panel-close-btn">&times;</button>
  </div>
  <div class="room-panel-section"><h3>玩家列表</h3><div id="roomMembers"></div></div>
  <div class="room-panel-section"><h3>地图选择</h3>
    <div id="roomMapSelect">
      <div class="map-card selected" data-map="classic"><b>经典方块</b><p>四队基地环绕中心岛</p></div>
      <div class="map-card" data-map="twilight"><b>暮色森林</b><p>树冠基地 / 迷雾封锁</p></div>
    </div>
  </div>
  <div class="room-panel-section"><h3>模式选择</h3>
    <div id="roomModeSelect">
      <div class="mode-card selected" data-mode="classic">经典模式</div>
      <div class="campus-option" data-mode="campus" onclick="selectMode('campus')">校园寻宝<p>潜入校园，搜集秘宝，安全撤离</p></div>
    </div>
  </div>
  <div class="room-panel-section" id="teamSection"><h3>队伍选择</h3>
    <button id="addAiBtn">添加AI替补（0/4）</button>
    <div class="team-select">
      <div class="team-btn" data-team="RED">红队</div><div class="team-btn" data-team="BLUE">蓝队</div>
      <div class="team-btn" data-team="GREEN">绿队</div><div class="team-btn" data-team="YELLOW">黄队</div>
    </div>
  </div>
  <div class="room-actions-row">
    <button class="start-btn" id="roomStartBtn" style="display:none">请先登录</button>
    <button class="start-btn" id="dissolveRoomBtn" style="display:none;background:#c44">解散房间</button>
  </div>
</div>
<!-- 游戏HUD -->
<div id="hud" style="display:none">
  <div id="crosshair"></div><div id="teamInfo"></div>
  <div id="hpBarOuter"><div id="hpBarInner"></div><span id="hpText">20/20</span></div>
  <div id="armorBarOuter"><div id="armorBarInner"></div><span id="armorText">0/0</span></div>
  <div id="resourceBar">
    <span class="resource-item" id="res_copper">铜 0</span><span class="resource-item" id="res_silver">银 0</span>
    <span class="resource-item" id="res_gold">金 0</span><span class="resource-item" id="res_jade">玉 0</span>
  </div>
  <div id="hotbar">
    <div class="hotbar-slot"><span class="item-icon"></span><span class="item-count"></span></div>
    <div class="hotbar-slot"><span class="item-icon"></span><span class="item-count"></span></div>
    <div class="hotbar-slot"><span class="item-icon"></span><span class="item-count"></span></div>
    <div class="hotbar-slot"><span class="item-icon"></span><span class="item-count"></span></div>
    <div class="hotbar-slot"><span class="item-icon"></span><span class="item-count"></span></div>
    <div class="hotbar-slot"><span class="item-icon"></span><span class="item-count"></span></div>
    <div class="hotbar-slot"><span class="item-icon"></span><span class="item-count"></span></div>
    <div class="hotbar-slot"><span class="item-icon"></span><span class="item-count"></span></div>
  </div>
  <canvas id="minimapCanvas" width="120" height="120"></canvas>
  <button id="shopBtn">商店</button><button id="skillBtn">技能</button>
  <button id="backpackBtn">背包</button><button id="growthBtn">成长</button>
  <div id="gameMessages"></div><div id="killFeed"></div><div id="fpsCounter"></div>
</div>
<!-- 角色选择 -->
<div id="startRolePanel" class="overlay-panel" style="display:none">
  <h2>选择你的角色</h2><p>10秒内选择，超时默认狐狸</p>
  <div id="startRoleCards"></div><div id="roleCatBar"></div>
</div>
<!-- 商店 -->
<div id="shopPanel" style="display:none">
  <div class="shop-header"><h3>商店</h3><button class="shop-close">&times;</button></div>
  <div class="shop-tabs">
    <button class="shop-tab" data-tab="build">建筑</button><button class="shop-tab" data-tab="weapon">武器</button>
    <button class="shop-tab" data-tab="armor">防具</button><button class="shop-tab" data-tab="special">特殊</button>
  </div>
  <div id="shopGrid" class="shop-grid"></div>
</div>
<!-- 背包 -->
<div id="backpackPanel" style="display:none">
  <h3>背包</h3><button class="panel-close-btn">&times;</button><div id="backpackGrid"></div>
</div>
<!-- 建造面板 -->
<div id="buildPanel" style="display:none">
  <span id="buildHpText"></span>
  <button id="upgradeBuildBtn">升级</button><button id="destroyBuildBtn">拆毁</button><button id="moveBuildBtn">移动</button>
</div>
<!-- 成长面板 -->
<div id="growthPanel" style="display:none">
  <h3>成长中心</h3><button class="panel-close-btn">&times;</button><div id="growthContent"></div>
</div>
<!-- 游戏结束 -->
<div id="gameOverScreen" style="display:none">
  <h1 class="result-title">游戏结束！</h1><p class="winner"></p>
  <div class="stats"></div><div id="mvpSection"></div><div id="allyStatsSection"></div><div id="rankChange"></div>
  <button onclick="location.reload()">返回主菜单</button>
  <button id="earlyExitBtn" style="display:none">提前退出</button>
</div>
<!-- 快捷栏右键菜单 -->
<div id="slotContextMenu" style="display:none">
  <button data-action="split">拆分</button><button data-action="drop">丢弃</button>
</div>
<!-- 校园寻宝HUD -->
<div id="campusHud" style="display:none">
  <div id="campusTimer"></div><div id="campusStatus"></div><div id="campusWeight"></div><div id="campusEvent"></div>
  <div id="campusBackpack"><h4>搜刮背包</h4><span id="campusBpCount">0/10</span><div id="campusBpGrid"></div></div>
</div>
<!-- 大地图 -->
<div id="bigMapPanel" class="overlay-panel" style="display:none">
  <canvas id="bigMapCanvas" width="400" height="400"></canvas>
  <button class="panel-close-btn">&times;</button>
</div>
<!-- 移动端控制 -->
<div id="mobileControls" style="display:none">
  <div class="joystick-area" id="joystickArea"></div>
  <div class="mobile-btn-group">
    <button class="mobile-btn" id="mobileJumpBtn">跳</button><button class="mobile-btn" id="mobileAtkBtn">攻</button>
    <button class="mobile-btn" id="mobileBuildBtn">建</button><button class="mobile-btn" id="mobileSkillBtn">技</button>
  </div>
</div>
<!-- 联机状态 -->
<div id="netBadge" style="display:none"></div>
<!-- 创作工坊 -->
<div id="workshopPanel" class="overlay-panel" style="display:none">
  <button class="panel-close-btn">&times;</button>
  <h2>创作工坊</h2>
  <div><button id="newMapBtn">新建地图</button><button id="loadMapBtn">加载地图</button></div>
  <div id="mapEditorTools"></div>
  <div>
    <label>铜生成速率 <input type="number" id="ruleCopper" value="1" min="0" step="0.5"></label><br>
    <label>银生成速率 <input type="number" id="ruleSilver" value="0.5" min="0" step="0.5"></label><br>
    <label>金生成速率 <input type="number" id="ruleGold" value="0.2" min="0" step="0.1"></label><br>
    <label>玉生成速率 <input type="number" id="ruleJade" value="0.05" min="0" step="0.01"></label><br>
    <label><input type="checkbox" id="ruleAdvRes" checked> 启用高级资源</label><br>
    <button id="saveRuleBtn">保存</button><button id="resetRuleBtn">恢复默认</button><button id="testMapBtn">本地试玩</button>
  </div>
</div>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="js/config.js?v=9"></script>
<script defer src="js/network.js?v=9"></script>
<script defer src="js/growth.js?v=9"></script>
<script defer src="js/social.js?v=9"></script>
<script defer src="js/chibi-models.js?v=9"></script>
<script defer src="js/campus-mode.js?v=9"></script>
<script defer src="js/campus-map.js?v=9"></script>
<script defer src="js/engine.js?v=9"></script>
<script defer src="js/ai-controller.js?v=9"></script>
<script defer src="js/input.js?v=9"></script>
<script defer src="js/ui.js?v=9"></script>
<script defer src="js/game.js?v=9"></script>
<script defer src="js/season-pass.js?v=9"></script>
<script defer src="js/menu-features.js?v=9"></script>
<script>
/* 全局模式选择 */
function selectMode(mode){
  window._selectedMode=mode;
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('selected'));
  const m=document.querySelector('.mode-card[data-mode="'+mode+'"]');
  if(m)m.classList.add('selected');
  document.querySelectorAll('.campus-option').forEach(c=>c.classList.remove('selected'));
  const co=document.querySelector('.campus-option[data-mode="campus"]');
  if(co&&mode==='campus')co.classList.add('selected');
  const ts=document.getElementById('teamSection'),ai=document.getElementById('addAiBtn'),sb=document.getElementById('roomStartBtn');
  if(mode==='campus'){if(ts)ts.style.display='none';if(ai)ai.style.display='none';if(sb)sb.style.display='inline-block';}
  else{if(ts)ts.style.display='';if(ai)ai.style.display='';if(sb)sb.style.display='none';}
}
document.addEventListener('DOMContentLoaded',()=>{
  let selectedTeam='RED',auth=null,netMgr=null,localOnly=false,lobbyAiSlots=0;
  const $=id=>document.getElementById(id);
  function updateStartBtn(){const b=$('roomStartBtn');if(!b)return;if(!auth||!auth.user){b.textContent='请先登录';b.style.display='none';return;}const m=window._selectedMode||'classic';b.textContent=m==='campus'?'开始寻宝':'开始游戏';b.style.display=localOnly?'inline-block':'none';}
  function escapeHtml(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  function setAuthStatus(t){const e=$('authStatus');if(e)e.textContent=t;}
  function setRoomStatus(t){const e=$('roomStatus');if(e)e.textContent=t;}
  function closePanel(id){const e=$(id);if(e)e.style.display='none';}
  function closeAllLobbyPanels(){['profilePanel','playOptionsPanel','workshopPanel','roomPanel'].forEach(closePanel);}
  function togglePanel(id){const e=$(id);if(e)e.style.display=e.style.display==='none'?'flex':'none';}
  /* 队伍选择 */
  document.querySelectorAll('.team-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedTeam=btn.dataset.team;updateStartBtn();});});
  /* 地图选择 */
  document.querySelectorAll('.map-card').forEach(card=>{card.addEventListener('click',()=>{document.querySelectorAll('.map-card').forEach(c=>c.classList.remove('selected'));card.classList.add('selected');});});
  /* 模式卡片点击 */
  document.querySelectorAll('.mode-card').forEach(card=>{card.addEventListener('click',()=>selectMode(card.dataset.mode));});
  /* 主菜单按钮 */
  $('profileBtn')?.addEventListener('click',()=>togglePanel('profilePanel'));
  $('playBtn')?.addEventListener('click',()=>togglePanel('playOptionsPanel'));
  $('workshopBtn')?.addEventListener('click',()=>togglePanel('workshopPanel'));
  /* 创建房间 */
  $('createRoomBtn')?.addEventListener('click',async()=>{if(!auth||!auth.user){closePanel('playOptionsPanel');$('profilePanel').style.display='';return;}try{if(netMgr?.createRoom){const r=await netMgr.createRoom();setRoomStatus('房间 '+(r.code||''));openRoomPanel();}}catch(e){setRoomStatus('创建失败: '+(e.message||e));}});
  /* 加入房间 */
  $('joinRoomBtn')?.addEventListener('click',async()=>{const c=$('roomCodeInput')?.value.trim();if(!c)return;if(!auth||!auth.user){closePanel('playOptionsPanel');$('profilePanel').style.display='';return;}try{if(netMgr?.joinRoom){await netMgr.joinRoom(c);openRoomPanel();}}catch(e){setRoomStatus('加入失败: '+(e.message||e));}});
  /* 本地试玩 */
  $('localPlayBtn')?.addEventListener('click',openLocalModePanel);
  /* 断线重连 */
  $('reconnectBtn')?.addEventListener('click',async()=>{try{if(netMgr?.reconnect){await netMgr.reconnect();setRoomStatus('重连成功');}}catch(e){setRoomStatus('重连失败: '+(e.message||e));}});
  /* 游戏内按钮 */
  document.querySelector('.shop-close')?.addEventListener('click',()=>window.game?.toggleShop?.());
  $('shopBtn')?.addEventListener('click',()=>window.game?.toggleShop?.());
  $('backpackBtn')?.addEventListener('click',()=>window.game?.toggleBackpack?.());
  $('growthBtn')?.addEventListener('click',()=>window.game?.toggleGrowthPanel?.());
  $('skillBtn')?.addEventListener('click',()=>window.game?.toggleSkill?.());
  /* 解散房间 */
  $('dissolveRoomBtn')?.addEventListener('click',async()=>{try{if(netMgr?.dissolveRoom)await netMgr.dissolveRoom();setRoomStatus('房间已解散');closePanel('roomPanel');$('mainMenu').style.display='';}catch(e){setRoomStatus('解散失败');}});
  /* AI替补 */
  $('addAiBtn')?.addEventListener('click',()=>{if(lobbyAiSlots<4){lobbyAiSlots++;updateAiButton();updateRoomMembers();}});
  /* 开始游戏 */
  $('roomStartBtn')?.addEventListener('click',()=>{
    if(!auth||!auth.user){closeAllLobbyPanels();$('profilePanel').style.display='';return;}
    const mode=window._selectedMode||'classic',mapCard=document.querySelector('.map-card.selected'),mapKey=mapCard?.dataset.map||'classic';
    const playerName=auth.user.user_metadata?.nickname||auth.user.email||'玩家';
    closeAllLobbyPanels();const hud=$('hud');if(hud)hud.style.display='none';const mm=$('mainMenu');if(mm)mm.style.display='none';
    const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;z-index:9999';
    ov.textContent='正在加载地图...';document.body.appendChild(ov);
    requestAnimationFrame(()=>{setTimeout(async()=>{
      try{if(window.game?.destroy)game.destroy();const c=document.createElement('canvas'),gl=c.getContext('webgl2')||c.getContext('webgl');
      if(!gl){ov.textContent='浏览器不支持 WebGL';return;}
      window.game=new Game();game.init({team:selectedTeam,mode,map:mapKey,playerName,localOnly,aiSlots:lobbyAiSlots,netMgr});
      game.start();ov.remove();if(hud)hud.style.display='';const nb=$('netBadge');if(nb)nb.style.display=(netMgr&&!localOnly)?'':'none';
      }catch(e){console.error(e);ov.textContent='加载失败: '+(e.message||e);setTimeout(()=>{ov.remove();if(mm)mm.style.display='';},2500);}
    },80);});
  });
  /* 快捷栏右键菜单 */
  const slotCtx=$('slotContextMenu');
  document.addEventListener('contextmenu',e=>{if(e.target.closest?.('.hotbar-slot')){e.preventDefault();if(slotCtx){slotCtx.style.display='block';slotCtx.style.left=e.clientX+'px';slotCtx.style.top=e.clientY+'px';}}else if(slotCtx)slotCtx.style.display='none';});
  document.addEventListener('click',e=>{if(slotCtx&&!slotCtx.contains(e.target))slotCtx.style.display='none';});
  /* 准心点击 / 触摸 */
  const isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
  if(!isMobile)document.addEventListener('mousedown',e=>window.game?.handlePointerAction?.(e.button));
  if(isMobile)document.addEventListener('touchstart',e=>window.game?.handleTouch?.(e),{passive:false});
  /* 面板关闭 */
  document.querySelectorAll('.panel-close-btn').forEach(btn=>{btn.addEventListener('click',()=>{const p=btn.closest('.overlay-panel');if(p)p.style.display='none';});});
  /* 登录/注册 */
  $('loginBtn')?.addEventListener('click',async()=>{const u=$('loginUser'),p=$('loginPass'),st=$('profileLoginStatus');if(!u||!p)return;try{if(window.SupabaseClient){const{data,error}=await window.SupabaseClient.auth.signInWithPassword({email:u.value,password:p.value});if(error)throw error;auth=data;setAuthStatus('已登录: '+(data.user?.email||''));updateStartBtn();refreshRoomUI();if(st)st.textContent='登录成功';}}catch(e){if(st)st.textContent='登录失败: '+(e.message||e);}});
  $('registerBtn')?.addEventListener('click',async()=>{const u=$('loginUser'),p=$('loginPass'),st=$('profileLoginStatus');if(!u||!p)return;try{if(window.SupabaseClient){const{error}=await window.SupabaseClient.auth.signUp({email:u.value,password:p.value});if(error)throw error;if(st)st.textContent='注册成功，请查收验证邮件';}}catch(e){if(st)st.textContent='注册失败: '+(e.message||e);}});
  /* 认证状态监听 */
  window.addEventListener('auth-changed',e=>{auth=e.detail;if(auth?.user)setAuthStatus('已登录: '+(auth.user.email||''));else{setAuthStatus('请先登录');auth=null;}updateStartBtn();refreshRoomUI();});
  /* 工坊按钮 */
  $('newMapBtn')?.addEventListener('click',()=>window.game?.editorNewMap?.());
  $('loadMapBtn')?.addEventListener('click',()=>window.game?.editorLoadMap?.());
  $('saveRuleBtn')?.addEventListener('click',()=>window.game?.saveRules?.());
  $('resetRuleBtn')?.addEventListener('click',()=>window.game?.resetRules?.());
  $('testMapBtn')?.addEventListener('click',()=>window.game?.testMap?.());
  /* 遗留函数定义 */
  function openLocalModePanel(){localOnly=true;closeAllLobbyPanels();$('roomPanel')&&($('roomPanel').style.display='block');$('mainMenu')&&($('mainMenu').style.display='none');updateRoomMembers();updateStartBtn();}
  function updateAiButton(){const b=$('addAiBtn');if(b)b.textContent='添加AI替补（'+lobbyAiSlots+'/4）';}
  function openRoomPanel(){closeAllLobbyPanels();$('roomPanel')&&($('roomPanel').style.display='block');$('mainMenu')&&($('mainMenu').style.display='none');updateRoomMembers();}
  function updateRoomMembers(){const el=$('roomMembers');if(!el)return;if(netMgr?.members){el.innerHTML=netMgr.members.map(m=>'<div>'+escapeHtml(m.name||m)+'</div>').join('');}else{const n=auth?.user?(auth.user.user_metadata?.nickname||auth.user.email||'玩家'):'游客';el.innerHTML='<div>'+escapeHtml(n)+'</div>';}}
  function refreshRoomUI(){updateRoomMembers();updateAiButton();updateStartBtn();}
  window.setRoomStatus=setRoomStatus;window.closePanel=closePanel;window.closeAllLobbyPanels=closeAllLobbyPanels;
  window.escapeHtml=escapeHtml;window.setAuthStatus=setAuthStatus;window.updateStartBtn=updateStartBtn;
  window.updateAiButton=updateAiButton;window.openLocalModePanel=openLocalModePanel;
  window.openRoomPanel=openRoomPanel;window.updateRoomMembers=updateRoomMembers;window.refreshRoomUI=refreshRoomUI;
});
</script>
</body>
</html>
